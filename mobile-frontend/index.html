<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Tyde Mobile</title>
    <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="z" />
    <link data-trunk rel="css" href="styles.css" />
    <link data-trunk rel="copy-file" href="vendor/jsqr.js" />
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #0b0f14;
            color: #e8edf3;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        #app-root {
            min-height: 100vh;
            min-height: 100dvh;
            background: #0b0f14;
        }
        .boot-screen {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            padding: 28px;
            box-sizing: border-box;
            background: #0b0f14;
            color: #e8edf3;
        }
        .boot-logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .boot-status {
            color: #8b95a5;
            font-size: 15px;
            line-height: 1.45;
        }
        .boot-error {
            margin-top: 12px;
            padding: 12px;
            border: 1px solid #f87171;
            border-radius: 10px;
            background: #2a1515;
            color: #fca5a5;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
    </style>
</head>
<body data-theme="dark">
    <div id="app-root">
        <div id="boot-screen" class="boot-screen">
            <div class="boot-logo">Tyde Mobile</div>
            <div id="boot-status" class="boot-status">
                Starting frontend… If this stays here, the WASM bundle did not mount.
            </div>
        </div>
    </div>
    <script>
    (function installBootDiagnostics() {
        const showBootError = (message) => {
            const root = document.getElementById("boot-screen") || document.getElementById("app-root") || document.body;
            if (!root) return;
            let error = document.getElementById("boot-error");
            if (!error) {
                error = document.createElement("div");
                error.id = "boot-error";
                error.className = "boot-error";
                root.appendChild(error);
            }
            error.textContent = message;
        };
        window.addEventListener("error", (event) => {
            showBootError("JavaScript error: " + (event.message || "unknown") + "\n" + (event.filename || "unknown") + ":" + (event.lineno || 0));
        });
        window.addEventListener("unhandledrejection", (event) => {
            const reason = event.reason && event.reason.stack ? event.reason.stack : String(event.reason);
            showBootError("Unhandled promise rejection:\n" + reason);
        });
    })();

    </script>
    <!-- Keep vendor/jsqr.js byte-for-byte identical to web/loader/vendor/jsqr.js.
         The loader copy is the source of truth; this classic script installs
         window.jsQR before the WASM scanner can request a camera. -->
    <script src="jsqr.js"></script>
</body>
</html>
