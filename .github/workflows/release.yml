name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (must start with v, e.g. v0.8.1)'
        required: true
      publish:
        description: 'Publish after artifacts are uploaded (required before remotes can download prereleases)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tag format
        run: |
          if [[ "$RELEASE_TAG" != v* ]]; then
            echo "::error::Release tag must start with v, got $RELEASE_TAG"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify release version matches tag
        run: python tools/check_release_version.py "${{ env.RELEASE_TAG }}"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$RELEASE_TAG" == *-* ]]; then
            edit_prerelease_flag=(--prerelease)
            create_prerelease_flag=(--prerelease)
          else
            edit_prerelease_flag=(--prerelease=false)
            create_prerelease_flag=()
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --draft --title "Tyde $RELEASE_TAG" --notes '' --target "$GITHUB_SHA" "${edit_prerelease_flag[@]}"
          else
            gh release create "$RELEASE_TAG" --draft --title "Tyde $RELEASE_TAG" --notes '' --target "$GITHUB_SHA" "${create_prerelease_flag[@]}"
          fi

  test:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The workspace compiles the Tauri GUI crates (tauri-shell,
      # tyde-mobile-shell), so the native test build needs the same system libs
      # the release build installs.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf musl-tools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # Run the native (logic) test suite BEFORE any expensive matrix build or
      # code signing. beta 20 shipped a startup panic that these very tests
      # (server::mobile_access) catch immediately — the release had no test gate
      # at all. Retry up to 3x so a genuinely flaky test does not block a release,
      # while a real failure (which fails all 3 attempts) still does.
      - name: Run workspace tests (retry flaky)
        shell: bash
        run: |
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::cargo test --workspace (attempt $i of $attempts)"
            if cargo test --workspace; then
              echo "::endgroup::"
              echo "workspace tests passed on attempt $i"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::cargo test attempt $i of $attempts failed; retrying"
          done
          echo "::error::cargo test --workspace failed after $attempts attempts"
          exit 1

  build:
    needs: [create-release, test]
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}
      TYDE_RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            rust-target: aarch64-apple-darwin
            server-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin --bundles app
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
            server-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin --bundles app
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            server-target: x86_64-unknown-linux-musl
            tauri-args: --target x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            server-target: aarch64-unknown-linux-musl
            tauri-args: --target aarch64-unknown-linux-gnu
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            server-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify release version matches tag
        run: python tools/check_release_version.py "${{ env.RELEASE_TAG }}"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf musl-tools zip

      - name: Install macOS tools
        if: startsWith(matrix.platform, 'macos')
        run: brew install create-dmg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }},${{ matrix.server-target }}

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # Install trunk AFTER the cache restore: swatinem/rust-cache has
      # cache-bin:true and restores ~/.cargo/bin, which could otherwise clobber
      # the freshly-installed binary with a stale wrong-arch one. Installing
      # last makes this step authoritative. taiki-e/install-action is
      # arch-aware (fetches aarch64 vs x86_64 correctly); jetli/trunk-action
      # @v0.5.0 hardcoded the x86_64 linux tarball and broke arm64 runners.
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14

      - name: Validate Apple signing secrets
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_KEY_CONTENT APPLE_API_KEY APPLE_API_ISSUER; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required Apple signing secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' \
              | head -n 1)
          fi

          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "::error::Could not find a Developer ID Application signing identity in APPLE_CERTIFICATE"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Write Apple API key
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Configure Windows signing
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE is not set; Windows artifacts will be built unsigned."
            exit 0
          }

          $missing = @()
          foreach ($name in @("WINDOWS_CERTIFICATE_PASSWORD", "WINDOWS_CERTIFICATE_THUMBPRINT")) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required Windows signing secret(s): $($missing -join ', ')"
            exit 1
          }

          New-Item -ItemType directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString `
              -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

          $thumbprint = ($env:WINDOWS_CERTIFICATE_THUMBPRINT -replace '\s', '').ToUpperInvariant()
          $config = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
              }
            }
          } | ConvertTo-Json -Depth 5
          Set-Content -Path frontend/tauri-shell/tauri.windows.conf.json -Value $config

      - name: Build headless Tyde Server binary
        run: cargo build --release --target ${{ matrix.server-target }} -p tyde-server --bin tyde-server

      # Smoke-test the freshly built binary before signing/packaging. beta 20
      # built cleanly but panicked on startup ("No provider set"), so a build
      # that never runs the binary shipped a 100%-broken release. This runs it.
      - name: Smoke test headless binary (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          BIN="target/${{ matrix.server-target }}/release/tyde-server"
          EXPECTED="${RELEASE_TAG#v}"

          # 1. The binary must load and report the version compiled into it.
          VERSION="$("$BIN" --version)"
          echo "tyde-server --version -> $VERSION"
          if [[ "$VERSION" != "$EXPECTED" ]]; then
            echo "::error::version mismatch: binary=$VERSION expected=$EXPECTED"
            exit 1
          fi

          # 2. The host must actually start and open its UDS socket. This is the
          #    exact path that panicked in beta 20: startup builds the mobile
          #    reqwest client, which needs a rustls crypto provider installed.
          SOCK="/tmp/tyde-smoke-$$.sock"
          rm -f "$SOCK"
          TYDE_SOCKET_PATH="$SOCK" "$BIN" host --uds &
          SRV_PID=$!
          ready=0
          for _ in $(seq 1 100); do
            if [[ -S "$SOCK" ]]; then ready=1; break; fi
            if ! kill -0 "$SRV_PID" 2>/dev/null; then break; fi
            sleep 0.2
          done
          kill "$SRV_PID" 2>/dev/null || true
          wait "$SRV_PID" 2>/dev/null || true
          rm -f "$SOCK"
          if [[ "$ready" != "1" ]]; then
            echo "::error::tyde-server host --uds never opened its socket — startup crash?"
            exit 1
          fi
          echo "headless host opened its socket — startup smoke passed"

      - name: Smoke test headless binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Windows has no UDS host mode, so verify the binary loads and reports
          # the right version (catches a link/startup panic in the CLI path).
          $bin = "target/${{ matrix.server-target }}/release/tyde-server.exe"
          $version = (& $bin --version).Trim()
          Write-Host "tyde-server --version -> $version"
          $expected = "${{ env.RELEASE_TAG }}".TrimStart('v')
          if ($version -ne $expected) {
            Write-Error "version mismatch: binary=$version expected=$expected"
            exit 1
          }

      - name: Build macOS app with Tauri
        if: startsWith(matrix.platform, 'macos')
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          projectPath: frontend/tauri-shell
          tauriScript: npx --prefix ../.. tauri
          args: ${{ matrix.tauri-args }}

      - name: Build with Tauri and upload release bundles
        if: "!startsWith(matrix.platform, 'macos')"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend/tauri-shell
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Tyde ${{ env.RELEASE_TAG }}
          releaseBody: ''
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          tauriScript: npx --prefix ../.. tauri
          # MSI rejects semver prerelease labels; stable Windows builds still use all bundles.
          args: ${{ matrix.tauri-args }}${{ matrix.platform == 'windows-latest' && contains(env.RELEASE_TAG, '-') && ' --bundles nsis' || '' }}

      - name: Package Linux headless Tyde binary
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.server-target }}/release"
          BIN_NAME="tyde-server"
          BIN_PATH="$BIN_DIR/$BIN_NAME"
          if [[ ! -x "$BIN_PATH" ]]; then
            echo "Expected executable not found at $BIN_PATH"
            exit 1
          fi
          ARCHIVE="$RUNNER_TEMP/tyde-server-${{ matrix.server-target }}.zip"
          (cd "$BIN_DIR" && zip -q -9 "$ARCHIVE" "$BIN_NAME")
          echo "HEADLESS_ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package signed macOS headless Tyde binary
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          BIN_DIR="target/${{ matrix.server-target }}/release"
          BIN_NAME="tyde-server"
          BIN_PATH="$BIN_DIR/$BIN_NAME"
          if [[ ! -x "$BIN_PATH" ]]; then
            echo "Expected executable not found at $BIN_PATH"
            exit 1
          fi

          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$BIN_PATH"
          codesign --verify --strict --verbose=2 "$BIN_PATH"

          ARCHIVE="$RUNNER_TEMP/tyde-server-${{ matrix.server-target }}.zip"
          ditto -c -k --keepParent "$BIN_PATH" "$ARCHIVE"

          xcrun notarytool submit "$ARCHIVE" \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" \
            --wait

          echo "HEADLESS_ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package Windows headless Tyde binary
        if: matrix.platform == 'windows-latest'
        run: |
          $binDir = "target/${{ matrix.server-target }}/release"
          $binPath = Join-Path $binDir "tyde-server.exe"
          if (!(Test-Path $binPath)) {
            Write-Error "Expected executable not found at $binPath"
            exit 1
          }
          $archive = Join-Path $env:RUNNER_TEMP "tyde-server-${{ matrix.server-target }}.zip"
          Compress-Archive -Path $binPath -DestinationPath $archive -Force
          "HEADLESS_ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload headless Tyde server binary
        if: matrix.platform != 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" "$HEADLESS_ARCHIVE" --clobber

      - name: Upload Windows headless Tyde server binary
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload $env:RELEASE_TAG $env:HEADLESS_ARCHIVE --clobber

      - name: Rebuild macOS DMG
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          BUNDLE_DIR="target/${{ matrix.rust-target }}/release/bundle"
          APP_BUNDLE=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name '*.app' | head -1)
          if [[ -z "$APP_BUNDLE" ]]; then
            echo "Expected .app bundle not found in $BUNDLE_DIR/macos"
            exit 1
          fi
          APP_NAME=$(basename "$APP_BUNDLE" .app)
          DMG_DIR="$BUNDLE_DIR/dmg"
          VERSION="${RELEASE_TAG#v}"
          DMG_PATH="$DMG_DIR/${APP_NAME}_${VERSION}_${{ matrix.rust-target }}.dmg"

          mkdir -p "$DMG_DIR"
          rm -f "$DMG_DIR"/*.dmg

          STAGING=$(mktemp -d)
          ditto "$APP_BUNDLE" "$STAGING/$APP_NAME.app"

          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "$APP_NAME.app" 180 220 \
            --app-drop-link 480 220 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$STAGING" || DMG_EXIT=$?

          rm -rf "$STAGING"

          if [[ "${DMG_EXIT:-0}" -ne 0 && "${DMG_EXIT:-0}" -ne 2 ]]; then
            echo "create-dmg failed with exit code $DMG_EXIT"
            exit 1
          fi

          echo "MACOS_DMG=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Sign and notarize DMG
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$MACOS_DMG"

          xcrun notarytool submit "$MACOS_DMG" \
            --issuer "$APPLE_API_ISSUER" \
            --key-id "$APPLE_API_KEY" \
            --key "$APPLE_API_KEY_PATH" \
            --wait

          xcrun stapler staple "$MACOS_DMG"
          xcrun stapler validate "$MACOS_DMG"
          spctl -a -t open --context context:primary-signature -v "$MACOS_DMG"

      - name: Upload macOS DMG to release
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" "$MACOS_DMG" --clobber

      - name: Generate Linux checksums
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        run: |
          BUNDLE_DIR="target/${{ matrix.rust-target }}/release/bundle"
          for f in "$BUNDLE_DIR"/appimage/*.AppImage "$BUNDLE_DIR"/deb/*.deb; do
            [ -f "$f" ] && sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload Linux checksums
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="target/${{ matrix.rust-target }}/release/bundle"
          for f in "$BUNDLE_DIR"/appimage/*.sha256 "$BUNDLE_DIR"/deb/*.sha256; do
            [ -f "$f" ] && gh release upload "$RELEASE_TAG" "$f" --clobber
          done

      - name: Cleanup macOS keychain
        if: startsWith(matrix.platform, 'macos') && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

  deploy-mobile-web:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: mobile-web-manifest
      cancel-in-progress: false
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify release version matches tag
        run: python tools/check_release_version.py "${{ env.RELEASE_TAG }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14

      - name: Test web release tooling
        run: |
          node --test web/deploy/*.test.mjs
          python3 -m unittest tools/test_check_mobile_web_manifest.py
          bash -n web/deploy/deploy.sh
          cd web/loader
          node --test

      - name: Validate AWS deploy role
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_TYDE_WEB_DEPLOY_ROLE_ARN || vars.AWS_TYDE_WEB_DEPLOY_ROLE_ARN }}
        run: |
          if [[ -z "$AWS_DEPLOY_ROLE_ARN" ]]; then
            echo "::error::Set AWS_TYDE_WEB_DEPLOY_ROLE_ARN as a GitHub secret or variable"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TYDE_WEB_DEPLOY_ROLE_ARN || vars.AWS_TYDE_WEB_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: Deploy mobile web bundle
        run: bash web/deploy/deploy.sh "${RELEASE_TAG}" --confirm --live-manifest-base

      - name: Verify deployed mobile web manifest
        run: |
          aws s3 cp s3://tycode-static/tyde/manifest.json "$RUNNER_TEMP/tyde-manifest.json" --region us-west-2
          python3 tools/check_mobile_web_manifest.py \
            --manifest "$RUNNER_TEMP/tyde-manifest.json" \
            "$RELEASE_TAG"

  publish-release:
    needs:
      - build
      - deploy-mobile-web
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.deploy-mobile-web.result == 'success' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) ||
        (github.event_name == 'workflow_dispatch' && inputs.publish)
      )
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$RELEASE_TAG" == *-* ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --prerelease --latest=false --repo "$GITHUB_REPOSITORY"
          else
            gh release edit "$RELEASE_TAG" --draft=false --prerelease=false --latest --repo "$GITHUB_REPOSITORY"
          fi
