<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyde</title>
    <link rel="icon" type="image/png" href="/tycode-tiger.png">
    <link rel="stylesheet" href="/src/styles.css">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #121212;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out { opacity: 0; }
      #splash img { width: 80px; height: 80px; }
      #splash .splash-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: #e8e8e8;
        letter-spacing: 0.5px;
      }
      #splash .splash-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #333;
        border-top-color: #007acc;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
</head>
<body>
    <div id="splash">
      <img src="/tycode-tiger.png" alt="">
      <span class="splash-title">Tyde</span>
      <div class="splash-spinner"></div>
    </div>
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <span class="app-title" data-testid="app-title">Tyde</span>
                <button id="open-workspace-btn" class="header-btn" title="Open Workspace">Open Workspace</button>
                <button id="open-remote-workspace-btn" class="header-btn" title="Open Remote Workspace">Open Remote</button>
            </div>
            <div class="header-right">
                <div id="notification-bell"></div>
                <button id="header-settings-btn" class="header-btn" title="Settings" aria-label="Settings" data-testid="header-settings-btn">&#x2699;</button>
                <button id="feedback-btn" class="header-btn" title="Send Feedback" data-testid="feedback-btn">Feedback</button>
                <button id="left-dock-btn" class="header-btn" title="Toggle left dock" data-testid="left-dock-btn">Left</button>
                <button id="bottom-dock-btn" class="header-btn" title="Toggle bottom dock">Bottom</button>
                <button id="right-dock-btn" class="header-btn" title="Toggle right dock" data-testid="right-dock-btn">Right</button>
            </div>
        </header>
        <div class="app-body">
          <div id="project-rail"></div>
          <div class="main-content" id="workspace-container">
          </div>
        </div>
        <div class="side-panel" id="side-panel">
            <div class="side-panel-header">
                <span class="side-panel-title"></span>
                <button class="side-panel-close">&times;</button>
            </div>
            <div class="side-panel-content" id="side-panel-content"></div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
