# cargo-nextest configuration.
#
# nextest runs each test in its own process and parallelizes across *all* test
# binaries at once (plain `cargo test` runs binaries one after another), which
# is the main reason the integration suite is much faster under nextest.
#
# The canonical wrapper invokes nextest. Do not run this stage directly; use
# `./dev.sh check` so repetition, time limits, compact logs, and cleanup apply.

nextest-version = "0.9.100"
experimental = ["wrapper-scripts"]

[scripts.wrapper.macos-test-binary]
command = { command-line = "tools/run-nextest-binary.sh", relative-to = "workspace-root" }

# macOS test binaries are cloned outside the enormous shared target directory
# to avoid dyld paging stalls. The wrapper keys clones by logical test target,
# removes superseded identities, and safely recovers locks left by dead copiers.

# Several backend tests stand up a *fake* CLI/app-server (a real subprocess:
# `python3`, a shell script, etc.) and serialize themselves with an in-process
# mutex — CODEX_FAKE_APP_SERVER_SERIAL, FAKE_CLAUDE_ENV_LOCK,
# ANTIGRAVITY_MCP_CONFIG_MUTEX. Those mutexes work under `cargo test`, where
# every test shares one process, but nextest runs each test in its own process
# so the mutexes no longer apply. Run concurrently, these subprocess-heavy
# tests both clobber the process-global state the mutex protected and starve
# each other's request timeouts (Codex's is 45s, Claude's is 2s), so they
# flake. Pinning them to a single thread restores the one-at-a-time behavior
# the in-process mutexes were providing.
[test-groups]
serial-backend-fakes = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'test(/backend::codex::tests::codex_backend_fork/) | test(/backend::claude::tests::(fake_|resume_session_missing)/) | test(/backend::antigravity::tests::(install_antigravity_mcp_config|mcp_guard)/)'
test-group = 'serial-backend-fakes'

# These tests intentionally exercise real CLI probes at tight process timeout
# boundaries. Reserve the runner while they probe so unrelated process-heavy
# tests cannot consume the deadline of healthy fake executables. The Tycode
# integration flows also isolate process-global HOME/PATH while spawning their
# fake subprocess, so both profiles reserve the runner with the same filter.
[[profile.default.overrides]]
filter = '(binary_id(tests::settings) & test(/(backend_(setup_payload_(uses_sign_in_command_and_versioned_tycode_probe|reports_found_unusable_hermes_cli)|config_snapshots_(expose_tycode_grouped_native_settings|report_tycode_native_settings_probe_failure))|set_setting_backend_native_settings_persists_and_refreshes_tycode_snapshot|tycode_|trusted_tycode_setup)/)) | test(/backend::setup::tests::version_probe_bounds_descendant_pipe_drain/)'
threads-required = "num-test-threads"

[[profile.ci.overrides]]
filter = 'test(/backend::codex::tests::codex_backend_fork/) | test(/backend::claude::tests::(fake_|resume_session_missing)/) | test(/backend::antigravity::tests::(install_antigravity_mcp_config|mcp_guard)/)'
test-group = 'serial-backend-fakes'

[[profile.ci.overrides]]
filter = '(binary_id(tests::settings) & test(/(backend_(setup_payload_(uses_sign_in_command_and_versioned_tycode_probe|reports_found_unusable_hermes_cli)|config_snapshots_(expose_tycode_grouped_native_settings|report_tycode_native_settings_probe_failure))|set_setting_backend_native_settings_persists_and_refreshes_tycode_snapshot|tycode_|trusted_tycode_setup)/)) | test(/backend::setup::tests::version_probe_bounds_descendant_pipe_drain/)'
threads-required = "num-test-threads"

[profile.default]
# The native suite is a fast local gate, not a background job. Crossing five
# minutes is a test failure that must be fixed rather than normalized.
global-timeout = "5m"
# A healthy integration test finishes well under 30s; anything slower is
# flagged in the run output so a creeping regression (e.g. a fixture that
# started spawning real subprocesses) is visible instead of silently bloating
# the suite.
slow-timeout = "30s"
retries = 0
fail-fast = false
# Keep the source runner concise; dev.sh retains the complete repetition log
# and replays the complete failing repetition when this stage fails.
status-level = "slow"
final-status-level = "slow"
success-output = "never"
failure-output = "final"

[[profile.default.scripts]]
filter = "all()"
platform = 'cfg(target_os = "macos")'
list-wrapper = "macos-test-binary"
run-wrapper = "macos-test-binary"

[profile.ci]
global-timeout = "5m"
slow-timeout = "60s"
# Retry flaky tests a couple of times before declaring failure, and keep going
# after the first failure so one bad test doesn't mask others.
retries = 2
fail-fast = false
status-level = "slow"
final-status-level = "slow"
success-output = "never"
failure-output = "final"

[[profile.ci.scripts]]
filter = "all()"
platform = 'cfg(target_os = "macos")'
list-wrapper = "macos-test-binary"
run-wrapper = "macos-test-binary"
